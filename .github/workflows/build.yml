name: Сборка проектов
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  build-webpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Сборка Webpack
        run: |
          cd webpack-project
          npm ci
          npm run build
      - name: Сохранение артефактов
        uses: actions/upload-artifact@v4
        with:
          name: webpack-build
          path: webpack-project/dist

  build-vite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Сборка Vite
        run: |
          cd vite-project
          npm install
          npm run build
      - name: Сохранение артефактов
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: vite-project/dist